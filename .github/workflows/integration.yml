        with:
          go-version: '1.22'

      - name: Check KVM availability
        id: kvm
        run: |
          if [ -e /dev/kvm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::KVM not available, skipping integration test"
          fi

      - name: Install dependencies
        if: steps.kvm.outputs.available == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils swtpm openssh-client python3 curl jq

      - name: Run TPM EA test
        if: steps.kvm.outputs.available == 'true'
